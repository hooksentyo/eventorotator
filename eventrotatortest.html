<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Streamlabs Real-time Event Rotator (Lubrifont JP N & Queue Support)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- 🅰️ WDXL Lubrifont JP N を Google Fonts から読み込み -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            /* 🅰️ 全体にフォントを適用 */
            font-family: 'WDXL Lubrifont JP N', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 📦 メインコンテナ */
        #rotator-container {
            width: 400px;
            height: 50px;
            position: relative;
            box-sizing: border-box;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(10, 10, 10, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* 🚨 アラート背景レイヤー */
        #alert-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transform: translateX(-100%);
            opacity: 0;
        }

        /* アラート起動時のスライドイン */
        #rotator-container.alert-active #alert-bg-overlay {
            opacity: 1;
            transform: translateX(0);
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.15s ease;
        }
        
        /* アラート終了時のハケ */
        #rotator-container.alert-exit #alert-bg-overlay {
            opacity: 0;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.7, 0, 0.84, 0), opacity 0.3s ease;
        }

        /* 🎨 各アラートの背景色設定 */
        .alert-bg-follow { background: #9146FF !important; }      /* 🟣 紫 */
        .alert-bg-sub { background: #FFD700 !important; }         /* 🟡 金・黄 */
        .alert-bg-bits { background: #00E5FF !important; }        /* 🔹 水色 (Bits) */
        .alert-bg-donation { background: #FF0000 !important; }    /* 🔴 赤 */

        /* 🚨 各アラートの外枠発光（グロウ効果） */
        #rotator-container.alert-active.alert-type-follow { box-shadow: 0 0 20px rgba(145, 70, 255, 0.6); border-color: rgba(255,255,255,0.4); }
        #rotator-container.alert-active.alert-type-sub { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); border-color: rgba(255,255,255,0.4); }
        #rotator-container.alert-active.alert-type-bits { box-shadow: 0 0 20px rgba(0, 229, 255, 0.6); border-color: rgba(255,255,255,0.4); }
        #rotator-container.alert-active.alert-type-donation { box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); border-color: rgba(255,255,255,0.4); }

        /* 📝 テキスト・アイコン共通 */
        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
            z-index: 3;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            visibility: hidden;
        }

        .content-wrapper.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
        .content-wrapper.exit {
            opacity: 0;
            transform: translateY(-10px);
        }

        /* アラート発生時専用の横スライド効果 */
        #rotator-container.alert-active .content-wrapper.active {
            transform: translateX(-40px);
            opacity: 0;
            transition: none;
        }
        #rotator-container.alert-active .content-wrapper.active.slide-ready {
            transform: translateX(0);
            opacity: 1;
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
        }

        /* 📐 Font Awesome アイコン全体のサイズ設定 */
        .icon {
            font-size: 22px; 
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        /* 🎨 通常時のアイコンの色をそれぞれのイメージカラーに設定 */
        .theme-follow .icon    { color: #9146FF; } /* フォロー：Twitchパープル */
        .theme-sub .icon       { color: #FFD700; } /* サブスク：ゴールド */
        .theme-bits .icon      { color: #00E5FF; } /* Bits：アクアブルー */
        .theme-donation .icon  { color: #FF0000; } /* ドネーション：レッド */

        /* 🚨 アラート発生時：文字アイコンを真っ白にして少し大きく */
        #rotator-container.alert-active .icon { 
            color: #FFFFFF !important;
            transform: scale(1.15);
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4)); 
        }

        /* 📐 テキストボックスの基本設定 */
        .text-box {
            color: #F0F0F0;
            font-size: 18px; 
            font-weight: 400;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-top: 2px; /* ドット絵フォントの上下中央のズレを微調整 */
        }

        .prefix {
            font-weight: 600;
            margin-right: 8px;
            color: #AAAAAA;
        }

        /* アラートモード時の文字装飾（白文字クッキリ化） */
        #rotator-container.alert-active .text-box { color: #FFFFFF !important; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        #rotator-container.alert-active .prefix { color: #FFFFFF !important; opacity: 0.9; }
    </style>
</head>
<body>

    <div id="rotator-container">
        <div id="alert-bg-overlay"></div>
        <div id="wrapper-follower" class="content-wrapper"></div>
        <div id="wrapper-sub" class="content-wrapper"></div>
        <div id="wrapper-bits" class="content-wrapper"></div>
        <div id="wrapper-donation" class="content-wrapper"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TOKEN = urlParams.get('token'); 

        const ROTATE_INTERVAL = 10000; // 通常の切り替え間隔（10秒）
        const ALERT_DURATION = 5000;   // アラートの固定表示時間（5秒）

        // 📦 データの管理用ストア
        let store = {
            follower: { name: "No Data Yet", source: "theme-follow", prefix: "LAST FOLLOWER:" },
            sub: { name: "No Data Yet", source: "theme-sub", prefix: "LAST SUB:" },
            bits: { name: "No Data Yet", source: "theme-bits", prefix: "LAST BITS:" },
            donation: { name: "No Data Yet", source: "theme-donation", prefix: "LAST DONATOR:" }
        };

        const wrappers = {
            follower: document.getElementById('wrapper-follower'),
            sub: document.getElementById('wrapper-sub'),
            bits: document.getElementById('wrapper-bits'),
            donation: document.getElementById('wrapper-donation')
        };
        const container = document.getElementById('rotator-container');
        const alertBg = document.getElementById('alert-bg-overlay');

        let currentKey = 'follower';
        let rotateTimer = null;
        
        // 🔒 キュー（行列）管理用
        let alertQueue = [];
        let isProcessingAlert = false;

        function updateWrapperHTML(key) {
            const data = store[key];
            const wrapper = wrappers[key];
            if (!wrapper) return;
            
            wrapper.className = `content-wrapper ${data.source}`;

            // 🌟 Font Awesomeのアイコンを設定
            let iconHTML = ''; 
            if (key === 'follower') {
                iconHTML = '<i class="fa-brands fa-twitch"></i>'; 
            } 
            if (key === 'sub') {
                iconHTML = '<i class="fa-solid fa-star"></i>';   
            } 
            if (key === 'bits') {
                iconHTML = '<i class="fa-solid fa-gem"></i>';    
            } 
            if (key === 'donation') {
                iconHTML = '<i class="fa-solid fa-heart"></i>';  
            }

            wrapper.innerHTML = `
                <div class="icon">${iconHTML}</div>
                <div class="text-box">
                    <span class="prefix">${data.prefix}</span>
                    <span class="name">${data.name}</span>
                </div>
            `;
        }

        function changeActiveWrapper(nextKey, isAlertCall = false) {
            const currentWrapper = wrappers[currentKey];
            const nextWrapper = wrappers[nextKey];

            if (currentWrapper && currentWrapper.classList.contains('active')) {
                currentWrapper.classList.add('exit');
                setTimeout(() => {
                    currentWrapper.classList.remove('active', 'exit', 'slide-ready');
                }, 400);
            }

            currentKey = nextKey;
            updateWrapperHTML(nextKey);
            
            if (isAlertCall) {
                if(nextWrapper) {
                    nextWrapper.classList.remove('exit', 'slide-ready');
                    nextWrapper.classList.add('active');
                    setTimeout(() => {
                        nextWrapper.classList.add('slide-ready');
                    }, 20);
                }
            } else {
                setTimeout(() => {
                    if(nextWrapper) nextWrapper.classList.add('active');
                }, 50);
            }
        }

        function startRotation() {
            if (rotateTimer) clearInterval(rotateTimer);
            rotateTimer = setInterval(() => {
                if (isProcessingAlert) return; // アラート処理中なら通常ローテはスキップ
                const keys = Object.keys(store);
                let nextIndex = (keys.indexOf(currentKey) + 1) % keys.length;
                changeActiveWrapper(keys[nextIndex]);
            }, ROTATE_INTERVAL);
        }

        // 📥 通知を行列に並べる
        function enqueueAlert(key, name) {
            alertQueue.push({ key: key, name: name });
            processQueue();
        }

        // 🔄 行列の消化ロジック
        function processQueue() {
            if (isProcessingAlert || alertQueue.length === 0) return;

            isProcessingAlert = true; 

            const currentAlert = alertQueue.shift();
            const key = currentAlert.key;

            store[key].name = currentAlert.name;

            container.className = '';
            alertBg.className = '';
            
            let bgClass = 'alert-bg-follow';
            let typeClass = 'alert-type-follow';
            if (key === 'sub') { bgClass = 'alert-bg-sub'; typeClass = 'alert-type-sub'; }
            if (key === 'bits') { bgClass = 'alert-bg-bits'; typeClass = 'alert-type-bits'; }
            if (key === 'donation') { bgClass = 'alert-bg-donation'; typeClass = 'alert-type-donation'; }
            
            alertBg.classList.add(bgClass);

            setTimeout(() => {
                container.classList.add('alert-active', typeClass);
                changeActiveWrapper(key, true);
            }, 30);

            setTimeout(() => {
                container.classList.remove('alert-active');
                container.classList.add('alert-exit');
                
                setTimeout(() => {
                    container.className = '';
                    alertBg.className = '';
                    isProcessingAlert = false; 
                    
                    if (alertQueue.length > 0) {
                        setTimeout(() => { processQueue(); }, 100);
                    }
                }, 400);
            }, ALERT_DURATION);
        }

        // 初期化
        Object.keys(store).forEach(key => updateWrapperHTML(key));
        if(wrappers[currentKey]) wrappers[currentKey].classList.add('active');
        startRotation();

        // Streamlabs WebSocket 接続
        if (!TOKEN) {
            document.body.innerHTML = "<div style='color:red; padding:10px; font-size:12px;'>エラー: URLの末尾に ?token=あなたのトークン を設定してください。</div>";
        } else {
            const cleanToken = TOKEN.trim();
            const socketUrl = "wss://sockets.streamlabs.com/socket.io/?transport=websocket&token=" + cleanToken;
            const socket = new WebSocket(socketUrl);

            socket.onopen = () => { console.log('=== STREAMLABS CONNECTED SUCCESSFULLY ==='); };

            socket.onmessage = (message) => {
                try {
                    let rawData = message.data;
                    if (rawData.startsWith('42')) { rawData = rawData.substring(2); }
                    if (!rawData.startsWith('[') && !rawData.startsWith('{')) return;
                    
                    const parsed = JSON.parse(rawData);
                    let data = parsed;
                    if (Array.isArray(parsed) && parsed.length > 1) { data = parsed[1]; }
                    
                    // 履歴の初期ロード
                    if (data.type === 'init' && data.history) {
                        if (data.history.follow && data.history.follow.length > 0) store.follower.name = data.history.follow[0].name;
                        if (data.history.subscription && data.history.subscription.length > 0) store.sub.name = data.history.subscription[0].name;
                        if (data.history.donation && data.history.donation.length > 0) {
                            const d = data.history.donation[0];
                            store.donation.name = `${d.name} (${d.currency}${d.amount})`;
                        }
                        if (data.history.bits && data.history.bits.length > 0) {
                            const b = data.history.bits[0];
                            store.bits.name = `${b.name} (${b.amount}G)`;
                        }
                        Object.keys(store).forEach(key => updateWrapperHTML(key));
                    }

                    // リアルタイム通知受信時
                    if (data.message && data.message.length > 0) {
                        const eventType = data.type; 
                        const msg = data.message[0];

                        if (eventType === 'follow') {
                            enqueueAlert('follower', msg.name);
                        } 
                        else if (eventType === 'subscription' || eventType === 'resub') {
                            enqueueAlert('sub', msg.name);
                        } 
                        else if (eventType === 'bits') {
                            const formattedBits = `${msg.name} (${msg.amount}G)`;
                            enqueueAlert('bits', formattedBits);
                        }
                        else if (eventType === 'donation') {
                            const formattedDonation = `${msg.name} (${msg.currency}${msg.amount})`;
                            enqueueAlert('donation', formattedDonation);
                        }
                    }
                } catch (e) { console.error("Data parse error: ", e); }
            };

            socket.onclose = () => { setTimeout(() => { location.reload(); }, 5000); };
        }
    </script>
</body>
</html>
