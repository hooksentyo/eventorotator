<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Streamlabs Real-time Event Rotator (Minimal + Donation Price)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 📦 メインコンテナ：ミニマルな半透明座布団 */
        #rotator-container {
            width: 400px;
            height: 50px;
            position: relative;
            box-sizing: border-box;
            border-radius: 4px;
            overflow: hidden;
            
            /* ⬛ 【半透明の黒座布団】0.8＝透明度80% */
            background: rgba(10, 10, 10, 0.8); 
            
            /* シンプルな外枠（光らない） */
            border: 1px solid rgba(255, 255, 255, 0.08);
            
            transition: box-shadow 0.3s ease;
        }

        /* 🚨 アラート発生時の上品な下部ライン */
        #rotator-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            transition: all 0.4s ease;
            z-index: 5;
        }
        
        /* アラート発生時だけラインを伸ばす */
        #rotator-container.alert-active::after {
            left: 0;
            width: 100%;
        }
        #rotator-container.alert-active.twitch::after { background: #9146FF; }
        #rotator-container.alert-active.youtube::after { background: #FF0000; }
        #rotator-container.alert-active.donation-theme::after { background: #00E676; }

        /* 🚨 アラート時の全体の影 */
        #rotator-container.alert-active {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* 📝 中身のテキスト・アイコン */
        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
            z-index: 3;
            
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            visibility: hidden;
        }

        .content-wrapper.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .content-wrapper.exit {
            opacity: 0;
            transform: translateY(-10px);
        }

        /* 通常時のアイコン色 */
        .twitch .icon { color: #9146FF; }
        .youtube .icon { color: #FF0000; }
        .donation-theme .icon { color: #00E676; }

        .icon {
            font-size: 16px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
        }

        .text-box {
            color: #F0F0F0;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prefix {
            font-weight: 600;
            margin-right: 6px;
            color: #AAAAAA;
        }

    </style>
</head>
<body>

    <div id="rotator-container">
        <div id="wrapper-follower" class="content-wrapper"></div>
        <div id="wrapper-sub" class="content-wrapper"></div>
        <div id="wrapper-donation" class="content-wrapper"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TOKEN = urlParams.get('token'); 

        const ROTATE_INTERVAL = 10000; 
        const ALERT_DURATION = 5000;   

        let store = {
            follower: { name: "No Data Yet", source: "twitch", prefix: "LAST FOLLOWER:" },
            sub: { name: "No Data Yet", source: "twitch", prefix: "LAST SUB:" },
            // 💡 ドネーションだけ分かりやすいよう prefix のコロンを抜いて、デザインで調整できるようにします
            donation: { name: "No Data Yet", source: "donation-theme", prefix: "LAST DONATOR:" }
        };

        const wrappers = {
            follower: document.getElementById('wrapper-follower'),
            sub: document.getElementById('wrapper-sub'),
            donation: document.getElementById('wrapper-donation')
        };
        const container = document.getElementById('rotator-container');

        let currentKey = 'follower';
        let rotateTimer = null;
        let isAlerting = false;

        function updateWrapperHTML(key) {
            const data = store[key];
            const wrapper = wrappers[key];
            if (!wrapper) return;
            
            wrapper.className = `content-wrapper ${data.source}`;

            let iconHTML = '<i class="fa-solid fa-star"></i>'; 
            if (data.source === 'twitch') iconHTML = '<i class="fa-brands fa-twitch"></i>';
            if (data.source === 'youtube') iconHTML = '<i class="fa-brands fa-youtube"></i>';
            if (data.source === 'donation-theme') iconHTML = '<i class="fa-solid fa-money-bill-wave"></i>';

            wrapper.innerHTML = `
                <div class="icon">${iconHTML}</div>
                <div class="text-box">
                    <span class="prefix">${data.prefix}</span>
                    <span class="name">${data.name}</span>
                </div>
            `;
        }

        function changeActiveWrapper(nextKey) {
            const currentWrapper = wrappers[currentKey];
            const nextWrapper = wrappers[nextKey];

            if (currentWrapper && currentWrapper.classList.contains('active')) {
                currentWrapper.classList.add('exit');
                setTimeout(() => {
                    currentWrapper.classList.remove('active', 'exit');
                }, 400);
            }

            currentKey = nextKey;
            updateWrapperHTML(nextKey);
            
            setTimeout(() => {
                if(nextWrapper) nextWrapper.classList.add('active');
            }, 50);
        }

        function startRotation() {
            if (rotateTimer) clearInterval(rotateTimer);
            rotateTimer = setInterval(() => {
                if (isAlerting) return;
                const keys = Object.keys(store);
                let nextIndex = (keys.indexOf(currentKey) + 1) % keys.length;
                changeActiveWrapper(keys[nextIndex]);
            }, ROTATE_INTERVAL);
        }

        function triggerAlertInterrupt(key) {
            isAlerting = true;
            const sourceClass = store[key].source;
            container.className = `alert-active ${sourceClass}`;
            changeActiveWrapper(key);
            setTimeout(() => {
                isAlerting = false;
                container.className = '';
            }, ALERT_DURATION);
        }

        Object.keys(store).forEach(key => updateWrapperHTML(key));
        if(wrappers[currentKey]) wrappers[currentKey].classList.add('active');
        startRotation();

        if (!TOKEN) {
            document.body.innerHTML = "<div style='color:red; padding:10px; font-size:12px;'>エラー: URLの末尾に ?token=あなたのトークン を設定してください。</div>";
        } else {
            const cleanToken = TOKEN.trim();
            const socketUrl = "wss://sockets.streamlabs.com/socket.io/?transport=websocket&token=" + cleanToken;
            const socket = new WebSocket(socketUrl);

            socket.onopen = () => { console.log('=== STREAMLABS CONNECTED SUCCESSFULLY ==='); };

            socket.onmessage = (message) => {
                try {
                    let rawData = message.data;
                    if (rawData.startsWith('42')) { rawData = rawData.substring(2); }
                    if (!rawData.startsWith('[') && !rawData.startsWith('{')) return;
                    
                    const parsed = JSON.parse(rawData);
                    let data = parsed;
                    if (Array.isArray(parsed) && parsed.length > 1) { data = parsed[1]; }
                    
                    // 📥 初回データ読み込み時 (履歴)
                    if (data.type === 'init' && data.history) {
                        if (data.history.follow && data.history.follow.length > 0) {
                            store.follower.name = data.history.follow[0].name;
                            store.follower.source = data.history.follow[0].platform || 'twitch';
                        }
                        if (data.history.subscription && data.history.subscription.length > 0) {
                            store.sub.name = data.history.subscription[0].name;
                            store.sub.source = data.history.subscription[0].platform || 'twitch';
                        }
                        // 💡 履歴のドネーションを「名前 (価格)」に整形
                        if (data.history.donation && data.history.donation.length > 0) {
                            const d = data.history.donation[0];
                            store.donation.name = `${d.name} (${d.currency}${d.amount})`;
                        }
                        Object.keys(store).forEach(key => updateWrapperHTML(key));
                    }

                    // 🚨 リアルタイム通知発生時
                    if (data.message && data.message.length > 0) {
                        const eventType = data.type; 
                        const msg = data.message[0];

                        if (eventType === 'follow') {
                            store.follower.name = msg.name;
                            store.follower.source = msg.platform || 'twitch';
                            triggerAlertInterrupt('follower');
                        } 
                        else if (eventType === 'subscription' || eventType === 'resub') {
                            store.sub.name = msg.name;
                            store.sub.source = msg.platform || 'twitch';
                            triggerAlertInterrupt('sub');
                        } 
                        // 💡 リアルタイムのドネーション通知を「名前 (価格)」に整形
                        else if (eventType === 'donation') {
                            store.donation.name = `${msg.name} (${msg.currency}${msg.amount})`;
                            triggerAlertInterrupt('donation');
                        }
                    }
                } catch (e) { console.error("Data parse error: ", e); }
            };

            socket.onclose = () => { setTimeout(() => { location.reload(); }, 5000); };
        }
    </script>
</body>
</html>
