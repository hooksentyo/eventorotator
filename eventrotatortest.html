<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Streamlabs Real-time Event Rotator (Alert Slide-In)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 📦 メインコンテナ：クリッピング用 */
        #rotator-container {
            width: 400px;
            height: 50px;
            position: relative;
            box-sizing: border-box;
            border-radius: 6px;
            overflow: hidden;
            
            /* 通常時はいつもの綺麗な半透明黒座布団 */
            background: rgba(10, 10, 10, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* 🚨 アラート時に座布団丸ごと色を上書きするレイヤー */
        #alert-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transform: translateX(-100%); /* 初期状態は左側に隠す */
            opacity: 0;
            transition: none; /* JSで一瞬で左に戻すために初期はnone */
        }

        /* アラート起動時のスライドインアニメーション（イージングを鋭く） */
        #rotator-container.alert-active #alert-bg-overlay {
            opacity: 1;
            transform: translateX(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
        }
        /* アラート終了時のフェードアウトハケ */
        #rotator-container.alert-exit #alert-bg-overlay {
            opacity: 0;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.7, 0, 0.84, 0), opacity 0.3s ease;
        }

        /* 各アラート専用のド派手な座布団カラー */
        .alert-bg-follow { background: #9146FF !important; }      /* 🟣 フォローは紫 */
        .alert-bg-sub { background: #FFD700 !important; }         /* 🟡 サブスクは黄（ゴールド） */
        .alert-bg-donation { background: #FF0000 !important; }    /* 🔴 ドネーションは赤 */

        /* 🚨 アラート時のコンテナ自体の発光（色付き座布団をさらに引き立てる） */
        #rotator-container.alert-active.alert-type-follow { box-shadow: 0 0 20px rgba(145, 70, 255, 0.6); border-color: rgba(255,255,255,0.4); }
        #rotator-container.alert-active.alert-type-sub { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); border-color: rgba(255,255,255,0.4); }
        #rotator-container.alert-active.alert-type-donation { box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); border-color: rgba(255,255,255,0.4); }

        /* 📝 中身のテキスト・アイコン */
        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
            z-index: 3; /* 色付き座布団（z-index:1）より上に配置 */
            
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            visibility: hidden;
        }

        /* 通常のローテーション切り替え */
        .content-wrapper.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
        .content-wrapper.exit {
            opacity: 0;
            transform: translateY(-10px);
        }

        /* 🚨 アラート発生時専用の文字スライドイン（座布団と一緒に左から右へシュッ！） */
        #rotator-container.alert-active .content-wrapper.active {
            transform: translateX(-50px);
            opacity: 0;
            transition: none;
        }
        #rotator-container.alert-active .content-wrapper.active.slide-ready {
            transform: translateX(0);
            opacity: 1;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }

        /* アイコンの色指定（通常時） */
        .theme-follow .icon { color: #9146FF; }
        .theme-sub .icon { color: #FFD700; }
        .theme-donation .icon { color: #FF0000; }

        .icon {
            font-size: 16px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
        }

        .text-box {
            color: #F0F0F0;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prefix {
            font-weight: 600;
            margin-right: 6px;
            color: #AAAAAA;
        }

        /* アラートモード時の文字装飾（背景が明るくなるので文字をパキッとクッキリさせます） */
        #rotator-container.alert-active .text-box { color: #FFFFFF !important; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        #rotator-container.alert-active .prefix { color: #FFFFFF !important; opacity: 0.9; }
        #rotator-container.alert-active .icon { color: #FFFFFF !important; transform: scale(1.1); filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4)); }

    </style>
</head>
<body>

    <div id="rotator-container">
        <!-- アラートの時だけ左からシュッと滑り込んでくる色付き背景 -->
        <div id="alert-bg-overlay"></div>

        <!-- 各コンテンツレイヤー -->
        <div id="wrapper-follower" class="content-wrapper"></div>
        <div id="wrapper-sub" class="content-wrapper"></div>
        <div id="wrapper-donation" class="content-wrapper"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TOKEN = urlParams.get('token'); 

        const ROTATE_INTERVAL = 10000; 
        const ALERT_DURATION = 5000;   

        // 💡 ご指定のカラーに合わせ、内部のsource名（クラス名）も分かりやすくリファクタリングしました
        let store = {
            follower: { name: "No Data Yet", source: "theme-follow", prefix: "LAST FOLLOWER:" },
            sub: { name: "No Data Yet", source: "theme-sub", prefix: "LAST SUB:" },
            donation: { name: "No Data Yet", source: "theme-donation", prefix: "LAST DONATOR:" }
        };

        const wrappers = {
            follower: document.getElementById('wrapper-follower'),
            sub: document.getElementById('wrapper-sub'),
            donation: document.getElementById('wrapper-donation')
        };
        const container = document.getElementById('rotator-container');
        const alertBg = document.getElementById('alert-bg-overlay');

        let currentKey = 'follower';
        let rotateTimer = null;
        let isAlerting = false;

        function updateWrapperHTML(key) {
            const data = store[key];
            const wrapper = wrappers[key];
            if (!wrapper) return;
            
            wrapper.className = `content-wrapper ${data.source}`;

            let iconHTML = '<i class="fa-solid fa-star"></i>'; 
            if (key === 'follower') iconHTML = '<i class="fa-brands fa-twitch"></i>';
            if (key === 'sub') iconHTML = '<i class="fa-solid fa-gem"></i>'; // サブスク用に上品な宝石アイコン
            if (key === 'donation') iconHTML = '<i class="fa-solid fa-heart"></i>'; // ドネーション用にハートアイコン

            wrapper.innerHTML = `
                <div class="icon">${iconHTML}</div>
                <div class="text-box">
                    <span class="prefix">${data.prefix}</span>
                    <span class="name">${data.name}</span>
                </div>
            `;
        }

        function changeActiveWrapper(nextKey, isAlertCall = false) {
            const currentWrapper = wrappers[currentKey];
            const nextWrapper = wrappers[nextKey];

            if (currentWrapper && currentWrapper.classList.contains('active')) {
                currentWrapper.classList.add('exit');
                setTimeout(() => {
                    currentWrapper.classList.remove('active', 'exit', 'slide-ready');
                }, 400);
            }

            currentKey = nextKey;
            updateWrapperHTML(nextKey);
            
            if (isAlertCall) {
                // アラートの時は一瞬遅らせて左から右へのスライドインを同期させる
                if(nextWrapper) {
                    nextWrapper.classList.remove('exit', 'slide-ready');
                    nextWrapper.classList.add('active');
                    setTimeout(() => {
                        nextWrapper.classList.add('slide-ready');
                    }, 50);
                }
            } else {
                // 通常ローテーション
                setTimeout(() => {
                    if(nextWrapper) nextWrapper.classList.add('active');
                }, 50);
            }
        }

        function startRotation() {
            if (rotateTimer) clearInterval(rotateTimer);
            rotateTimer = setInterval(() => {
                if (isAlerting) return;
                const keys = Object.keys(store);
                let nextIndex = (keys.indexOf(currentKey) + 1) % keys.length;
                changeActiveWrapper(keys[nextIndex]);
            }, ROTATE_INTERVAL);
        }

        function triggerAlertInterrupt(key) {
            isAlerting = true;
            
            // 1. まずコンテナの状態と背景色リセットして左に隠す
            container.className = '';
            alertBg.className = '';
            
            // アラートの種類に応じた背景色クラスを設定
            let bgClass = 'alert-bg-follow';
            let typeClass = 'alert-type-follow';
            if (key === 'sub') { bgClass = 'alert-bg-sub'; typeClass = 'alert-type-sub'; }
            if (key === 'donation') { bgClass = 'alert-bg-donation'; typeClass = 'alert-type-donation'; }
            
            alertBg.classList.add(bgClass);

            // 2. ほんの数ミリ秒空けてアニメーションをトリガー（スライドイン！）
            setTimeout(() => {
                container.classList.add('alert-active', typeClass);
                changeActiveWrapper(key, true);
            }, 20);

            // 3. 指定時間後にハケるアニメーションへ移行
            setTimeout(() => {
                container.classList.remove('alert-active');
                container.classList.add('alert-exit');
                
                // コンテナが右へハケ終わる頃に通常モードへ戻す
                setTimeout(() => {
                    container.className = '';
                    isAlerting = false;
                }, 300);
            }, ALERT_DURATION);
        }

        Object.keys(store).forEach(key => updateWrapperHTML(key));
        if(wrappers[currentKey]) wrappers[currentKey].classList.add('active');
        startRotation();

        if (!TOKEN) {
            document.body.innerHTML = "<div style='color:red; padding:10px; font-size:12px;'>エラー: URLの末尾に ?token=あなたのトークン を設定してください。</div>";
        } else {
            const cleanToken = TOKEN.trim();
            const socketUrl = "wss://sockets.streamlabs.com/socket.io/?transport=websocket&token=" + cleanToken;
            const socket = new WebSocket(socketUrl);

            socket.onopen = () => { console.log('=== STREAMLABS CONNECTED SUCCESSFULLY ==='); };

            socket.onmessage = (message) => {
                try {
                    let rawData = message.data;
                    if (rawData.startsWith('42')) { rawData = rawData.substring(2); }
                    if (!rawData.startsWith('[') && !rawData.startsWith('{')) return;
                    
                    const parsed = JSON.parse(rawData);
                    let data = parsed;
                    if (Array.isArray(parsed) && parsed.length > 1) { data = parsed[1]; }
                    
                    if (data.type === 'init' && data.history) {
                        if (data.history.follow && data.history.follow.length > 0) {
                            store.follower.name = data.history.follow[0].name;
                        }
                        if (data.history.subscription && data.history.subscription.length > 0) {
                            store.sub.name = data.history.subscription[0].name;
                        }
                        if (data.history.donation && data.history.donation.length > 0) {
                            const d = data.history.donation[0];
                            store.donation.name = `${d.name} (${d.currency}${d.amount})`;
                        }
                        Object.keys(store).forEach(key => updateWrapperHTML(key));
                    }

                    if (data.message && data.message.length > 0) {
                        const eventType = data.type; 
                        const msg = data.message[0];

                        if (eventType === 'follow') {
                            store.follower.name = msg.name;
                            triggerAlertInterrupt('follower');
                        } 
                        else if (eventType === 'subscription' || eventType === 'resub') {
                            store.sub.name = msg.name;
                            triggerAlertInterrupt('sub');
                        } 
                        else if (eventType === 'donation') {
                            store.donation.name = `${msg.name} (${msg.currency}${msg.amount})`;
                            triggerAlertInterrupt('donation');
                        }
                    }
                } catch (e) { console.error("Data parse error: ", e); }
            };

            socket.onclose = () => { setTimeout(() => { location.reload(); }, 5000); };
        }
    </script>
</body>
</html>
