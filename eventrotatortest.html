<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Streamlabs Real-time Event Rotator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #rotator-container {
            width: 400px;
            height: 50px;
            position: relative;
            padding: 4px;
            box-sizing: border-box;
        }

        /* 🎨 1個の光がゆっくり周回するネオンエフェクト */
        .event-card::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: conic-gradient(
                from 0deg,
                #9146FF 0%,
                #00E676 8%,
                transparent 15%,
                transparent 100%
            );
            animation: rotateNeon 8s linear infinite;
            z-index: 1;
        }

        .event-card {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(100% - 8px);
            height: calc(100% - 8px);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
            overflow: hidden; 
            border-radius: 6px;
            
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            visibility: hidden;
        }

        .event-card::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: calc(100% - 2px);
            height: calc(100% - 2px);
            background: rgba(15, 15, 15, 0.95);
            border-radius: 5px;
            z-index: 2;
        }

        .event-card.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
            z-index: 10;
        }

        .event-card.exit {
            opacity: 0;
            transform: translateY(-15px);
        }

        .event-card.alert-active {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .content {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .event-card.twitch .icon { color: #9146FF; }
        .event-card.youtube .icon { color: #FF0000; }
        .event-card.donation-theme .icon { color: #00E676; }

        .icon {
            font-size: 18px;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 100%;
        }

        .text-box {
            color: #EAEAEA;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prefix {
            font-weight: 600;
            margin-right: 6px;
            color: #999;
        }

        @keyframes rotateNeon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="rotator-container">
        <div id="card-follower" class="event-card"><div class="content"></div></div>
        <div id="card-sub" class="event-card"><div class="content"></div></div>
        <div id="card-donation" class="event-card"><div class="content"></div></div>
    </div>

    <script>
        // OBSのURL末尾から ?token=xxx を取得
        const urlParams = new URLSearchParams(window.location.search);
        const TOKEN = urlParams.get('token'); 

        const ROTATE_INTERVAL = 10000; 
        const ALERT_DURATION = 5000;   

        let store = {
            follower: { name: "LOADING...", source: "twitch", prefix: "NEW FOLLOWER" },
            sub: { name: "LOADING...", source: "twitch", prefix: "NEW SUB" },
            donation: { name: "LOADING...", source: "donation-theme", prefix: "DONATOR" }
        };

        const cards = {
            follower: document.getElementById('card-follower'),
            sub: document.getElementById('card-sub'),
            donation: document.getElementById('card-donation')
        };

        let currentKey = 'follower';
        let rotateTimer = null;
        let isAlerting = false;

        function updateCardHTML(key) {
            const data = store[key];
            const card = cards[key];
            
            card.className = `event-card ${data.source}`;
            if (isAlerting && currentKey === key) card.classList.add('alert-active');

            let iconHTML = '<i class="fa-solid fa-star"></i>'; 
            if (data.source === 'twitch') iconHTML = '<i class="fa-brands fa-twitch"></i>';
            if (data.source === 'youtube') iconHTML = '<i class="fa-brands fa-youtube"></i>';
            if (data.source === 'donation-theme') iconHTML = '<i class="fa-solid fa-money-bill-wave"></i>';

            card.querySelector('.content').innerHTML = `
                <div class="icon">${iconHTML}</div>
                <div class="text-box">
                    <span class="prefix">${data.prefix}:</span>
                    <span class="name">${data.name}</span>
                </div>
            `;
        }

        function changeActiveCard(nextKey) {
            const currentCard = cards[currentKey];
            const nextCard = cards[nextKey];

            if (currentCard && currentCard.classList.contains('active')) {
                currentCard.classList.add('exit');
                setTimeout(() => {
                    currentCard.classList.remove('active', 'exit');
                }, 500);
            }

            currentKey = nextKey;
            updateCardHTML(nextKey);
            
            setTimeout(() => {
                nextCard.classList.add('active');
            }, 50);
        }

        function startRotation() {
            if (rotateTimer) clearInterval(rotateTimer);
            rotateTimer = setInterval(() => {
                if (isAlerting) return;
                const keys = Object.keys(store);
                let nextIndex = (keys.indexOf(currentKey) + 1) % keys.length;
                changeActiveCard(keys[nextIndex]);
            }, ROTATE_INTERVAL);
        }

        function triggerAlertInterrupt(key) {
            isAlerting = true;
            changeActiveCard(key);
            setTimeout(() => {
                isAlerting = false;
            }, ALERT_DURATION);
        }

        // 初期表示
        Object.keys(store).forEach(key => updateCardHTML(key));
        cards[currentKey].classList.add('active');
        startRotation();

        // 🌐 トークンチェックと最新のWebSocket通信ロジック
        if (!TOKEN) {
            document.body.innerHTML = "<div style='color:red; padding:10px; font-size:12px;'>エラー: URLの末尾に ?token=あなたのトークン を設定してください。</div>";
        } else {
            // URLにトークンを載せず、プレーンに接続を開始する
            const socket = new WebSocket('wss://sockets.streamlabs.com');

            socket.onopen = () => {
                console.log('WebSocket Connection Established.');
                
                // 🔑【超重要】公式仕様に基づく、接続直後のトークン認証メッセージ送信
                const authMessage = {
                    method: "auth",
                    token: TOKEN
                };
                socket.send(JSON.stringify(authMessage));
                console.log('Auth credentials sent to Streamlabs.');
            };

            socket.onmessage = (message) => {
                const data = JSON.parse(message.data);
                
                // 初期履歴データの読み込み成功時
                if (data.type === 'init') {
                    if (data.history && data.history.follow && data.history.follow.length > 0) {
                        store.follower.name = data.history.follow[0].name;
                        store.follower.source = data.history.follow[0].platform || 'twitch';
                    }
                    if (data.history && data.history.subscription && data.history.subscription.length > 0) {
                        store.sub.name = data.history.subscription[0].name;
                        store.sub.source = data.history.subscription[0].platform || 'twitch';
                    }
                    if (data.history && data.history.donation && data.history.donation.length > 0) {
                        store.donation.name = `${data.history.donation[0].currency}${data.history.donation[0].amount}`;
                    }
                    Object.keys(store).forEach(key => updateCardHTML(key));
                }

                // リアルタイム通知（テスト・本番両対応）
                if (data.message) {
                    const eventType = data.type; 
                    const msg = data.message[0];

                    if (eventType === 'follow') {
                        store.follower.name = msg.name;
                        store.follower.source = msg.platform || 'twitch';
                        triggerAlertInterrupt('follower');
                    } 
                    else if (eventType === 'subscription' || eventType === 'resub') {
                        store.sub.name = msg.name;
                        store.sub.source = msg.platform || 'twitch';
                        triggerAlertInterrupt('sub');
                    } 
                    else if (eventType === 'donation') {
                        store.donation.name = `${msg.currency}${msg.amount}`;
                        triggerAlertInterrupt('donation');
                    }
                }
            };

            socket.onclose = () => {
                console.log('WebSocket disconnected. Retrying...');
                setTimeout(() => { location.reload(); }, 5000);
            };
        }
    </script>
</body>
</html>
